<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-content" style="max-width: 600px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Panel de Administración</h2>
        
        <div class="card-section">
            <h3>Añadir Nuevo Vídeo</h3>
            <form id="form-admin" style="margin-top: 1rem;">
                <div class="input-group">
                    <label>Título del vídeo</label>
                    <input type="text" id="admin-titulo" required>
                </div>
                <div class="input-group">
                    <label>URL (Enlace)</label>
                    <input type="url" id="admin-url" required>
                </div>
                <div class="input-group">
                    <label>Duración (minutos)</label>
                    <input type="number" id="admin-duracion" required>
                </div>
                <div class="input-group">
                    <label>Nivel (1=Principiante, 2=Avanzado)</label>
                    <input type="number" id="admin-nivel" min="1" max="2" required>
                </div>
                <div class="input-group">
                    <label>Estado Emocional (1=Calma, 2=Equilibrio, 3=Energía)</label>
                    <input type="number" id="admin-estado" min="1" max="3" required>
                </div>
                <button type="submit" class="btn-primary">Subir Vídeo a la Base de Datos</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;"><a href="/index.html">Volver al inicio</a></p>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
